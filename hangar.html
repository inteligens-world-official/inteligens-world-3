<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW3 Inteligens - Hangar</title>
    <style>
        :root { --theme: #0f0; --glow: rgba(0, 255, 0, 0.3); }
        body { margin: 0; background: #050505; color: var(--theme); font-family: 'Courier New', monospace; overflow: hidden; }
        
        .hangar-frame {
            width: 100vw; height: 100vh;
            border: 10px solid #111; box-sizing: border-box;
            display: flex; flex-direction: column; padding: 20px;
        }

        .header { border-bottom: 2px solid var(--theme); padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        .weapon-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px; margin-top: 30px;
        }

        .weapon-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--theme);
            padding: 15px; position: relative;
            transition: 0.3s; cursor: pointer;
        }

        .weapon-card:hover { background: var(--glow); transform: scale(1.02); }

        .weapon-name { font-weight: bold; font-size: 18px; margin-bottom: 10px; display: block; }
        .stats { font-size: 12px; color: #ccc; }
        
        .btn-back {
            background: var(--theme); color: #000; border: none;
            padding: 10px 20px; font-weight: bold; cursor: pointer;
            text-decoration: none; display: inline-block; margin-top: 20px;
        }

        /* Tema Roșie */
        .theme-red { --theme: #ff0000; --glow: rgba(255, 0, 0, 0.3); }
    </style>
</head>
<body id="hangar-body">

<div class="hangar-frame">
    <div class="header">
        <span id="hangar-title">HANGAR TACTIC: ENTITATEA VERDE</span>
        <span id="user-display">RECRUT DANIEL</span>
    </div>

    <div class="weapon-grid" id="weapon-list">
        </div>

    <div style="margin-top: auto;">
        <a href="harta.html" class="btn-back">ÎNAPOI LA HARTĂ</a>
    </div>
</div>

<script>
    const armeVerzi = [
        { nume: "I-ASSAULT M4", tip: "Pușcă de asalt", dmg: "45", status: "ECHIPAT" },
        { nume: "GLOCK-17 TACTICAL", tip: "Pistol", dmg: "20", status: "DISPONIBIL" },
        { nume: "FRAG GRENADE", tip: "Exploziv", dmg: "80", status: "5 BUC" }
    ];

    const armeRosii = [
        { nume: "PLASMA RIFLE V1", tip: "Energie", dmg: "75", status: "ECHIPAT" },
        { nume: "ORBITAL BEACON", tip: "Satelit", dmg: "250", status: "LIMITAT" },
        { nume: "EMP SHOCKER", tip: "Tactic", dmg: "0", status: "STUN" }
    ];

    window.onload = function() {
        const rang = (localStorage.getItem('rang_jucator') || "RECRUT").toUpperCase();
        const nume = (localStorage.getItem('nume_comandant') || "DANIEL").toUpperCase();
        const body = document.getElementById('hangar-body');
        const list = document.getElementById('weapon-list');
        const title = document.getElementById('hangar-title');
        
        document.getElementById('user-display').innerText = rang + " " + nume;

        let armeSelectate = armeVerzi;

        if (rang === "GENERAL" || rang === "AMIRAL") {
            body.classList.add('theme-red');
            title.innerText = "HANGAR SUPREM: ENTITATEA ROȘIE";
            armeSelectate = armeRosii;
        }

        armeSelectate.forEach(arma => {
            list.innerHTML += 
                <div class="weapon-card">
                    <span class="weapon-name">${arma.nume}</span>
                    <div class="stats">
                        TIP: ${arma.tip}<br>
                        DAUNE: ${arma.dmg}<br>
                        STATUS: ${arma.status}
                    </div>
                </div>
            ;
        });
    }
</script>

</body>
</html>
