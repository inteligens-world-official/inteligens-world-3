<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inteligens - Centru de Recrutare</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #main-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        
        #background-map { 
            background: url('assets/map.jpg') no-repeat center center; 
            background-size: cover; 
            width: 100%; height: 100%; position: absolute; z-index: 1; 
            filter: brightness(0.6);
        }

        .ui-overlay { 
            position: absolute; z-index: 2; top: 60%; width: 100%; 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
        }

        .game-title {
            position: absolute; top: 15%; color: #fff; font-size: 3rem;
            text-shadow: 0 0 20px #ff0000; z-index: 2; letter-spacing: 10px;
            font-weight: bold;
            text-align: center;
        }

        .input-field { 
            width: 260px; padding: 12px; border: 2px solid #ff0000; 
            background: rgba(0,0,0,0.85); color: #fff; text-align: center; 
            font-weight: bold; font-size: 16px; outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        #btn-activate { 
            width: 288px; padding: 16px; background: #ff0000; color: #fff; 
            border: none; font-weight: bold; cursor: pointer; font-size: 18px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
        }

        #btn-activate:hover { background: #ff3333; box-shadow: 0 0 25px #ff0000; }
        #btn-activate:active { transform: scale(0.95); background: #b30000; }
    </style>
</head>
<body>

<div id="main-container">
    <div class="game-title">INTELIGENS</div>
    <div id="background-map"></div>
    <div class="ui-overlay">
        <input type="text" id="user-id" class="input-field" placeholder="ID COMANDANT">
        <input type="password" id="user-pass" class="input-field" placeholder="COD ACCES">
        <button id="btn-activate" onclick="salveazaRecrut()">START - ACTIVEAZĂ UNITATEA</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="database.js"></script>

<script>
  function salveazaRecrut() {
    const user = document.getElementById('user-id').value.trim();
    const pass = document.getElementById('user-pass').value.trim();
    const btn = document.getElementById('btn-activate');

    if(user !== "" && pass !== "") {
        btn.innerText = "SE MEMOREAZĂ DATELE...";
        btn.disabled = true;

        if (typeof salveazaSiLogheaza === "function") {
            salveazaSiLogheaza(user, pass);
        } else {
            firebase.database().ref('recruti/' + user).set({
                nume_utilizator: user,
                parola_acces: pass,
                data_creare: new Date().toLocaleString(),
                status: "RECRUT" // MODIFICAT: Acum orice jucător nou începe ca Recrut
            }).then(() => {
                localStorage.setItem('nume_comandant', user);
                alert("INTELIGENS: DATE MEMORATE PE SERVER. ACCES CONFIRMAT!");
                window.location.href = 'harta.html';
            }).catch(err => {
                alert("Eroare Server: " + err.message);
                btn.innerText = "START - ACTIVEAZĂ UNITATEA";
                btn.disabled = false;
            });
        }
    } else {
        alert('EROARE: Introdu ID și COD VALID!');
    }
  }
</script>

</body>
</html>
