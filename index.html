<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World War 3 - Recrutare</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #main-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        
        #background-map { 
            background: url('start.jpg') no-repeat center center; 
            background-size: cover; 
            width: 100%; height: 100%; position: absolute; z-index: 1; 
            filter: brightness(0.7);
        }

        .ui-overlay { 
            position: absolute; z-index: 2; top: 65%; width: 100%; 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
        }

        .input-field { 
            width: 260px; padding: 12px; border: 2px solid #ff0000; 
            background: rgba(0,0,0,0.85); color: #fff; text-align: center; 
            font-weight: bold; font-size: 16px; outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        #btn-activate { 
            width: 288px; padding: 16px; background: #ff0000; color: #fff; 
            border: none; font-weight: bold; cursor: pointer; font-size: 18px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
        }

        #btn-activate:active { transform: scale(0.95); background: #b30000; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="background-map"></div>
    <div class="ui-overlay">
        <input type="text" id="user-id" class="input-field" placeholder="ID RECRUT">
        <input type="password" id="user-pass" class="input-field" placeholder="COD ACCES">
        <button id="btn-activate" onclick="salveazaRecrut()">ACTIVEAZĂ UNITATEA</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // Configurația ta Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCZWA9HfF2vpxS-o3R4jTW3Pgzot8EtQN4",
    authDomain: "world-war-3-84b0f.firebaseapp.com",
    databaseURL: "https://world-war-3-84b0f-default-rtdb.firebaseio.com/",
    projectId: "world-war-3-84b0f",
    storageBucket: "world-war-3-84b0f.firebasestorage.app",
    messagingSenderId: "697325755845",
    appId: "1:697325755845:web:482887c50c2add41e97fac"
  };

  // Inițializare Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  function salveazaRecrut() {
    var user = document.getElementById('user-id').value.trim();
    var pass = document.getElementById('user-pass').value.trim();

    if(user !== "" && pass !== "") {
        // Salvare în baza de date
        database.ref('recruti/' + user).set({
          cod_acces: pass,
          timestamp: new Date().toLocaleString(),
          status: "activ"
        })
        .then(() => { 
            // Salvăm numele local pentru a-l folosi pe harta.html
            localStorage.setItem('nume_comandant', user);
            
            // Mesaj succes și redirecționare către harta.html
            alert('UNITATE ACTIVATĂ, AMIRALE!'); 
            window.location.href = 'harta.html'; 
        })
        .catch((error) => { 
            alert('EROARE COMUNICAȚII: ' + error.message); 
        });
    } else {
        alert('EROARE: Introdu ID și COD VALID!');
    }
  }
</script>

</body>
</html>
